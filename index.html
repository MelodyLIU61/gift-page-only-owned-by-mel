
<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>何国顺 - 单品限购 1 件</title>
  <meta name="description" content="商品名：何国顺 · 限购数量：1 · 备注：请联系 owner：melody" />
  <meta name="theme-color" content="#111827" />
  <!-- Social preview -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="何国顺 - 单品限购 1 件" />
  <meta property="og:description" content="备注：请联系 owner：melody" />
  <style>
    :root{
      --bg:#0b1220;        /* 深色背景 */
      --card:#0f172a;      /* 卡片基色 */
      --muted:#94a3b8;     /* 次要文字 */
      --text:#e5e7eb;      /* 主文字 */
      --primary:#22c55e;   /* 主按钮 */
      --accent:#f59e0b;    /* 强调色 */
      --danger:#ef4444;    /* 警示色 */
      --border: rgba(255,255,255,.08);
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{margin:0; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,'Noto Sans','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif; background:radial-gradient(900px 600px at 80% -10%, rgba(34,197,94,.18), transparent 60%), radial-gradient(700px 500px at -10% 110%, rgba(59,130,246,.18), transparent 60%), var(--bg); color:var(--text)}

    .wrap{min-height:100%; display:grid; place-items:center; padding:24px}

    .product{
      width:min(980px, 96vw);
      border:1px solid var(--border); border-radius:24px; overflow:hidden;
      background: linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.01));
      box-shadow: 0 40px 100px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.04);
      display:grid; grid-template-columns: 1.2fr 1fr;
    }
    @media (max-width:900px){ .product{ grid-template-columns: 1fr; } }

    .media{ position:relative; background:#0a0f1a; }
    .media-inner{ aspect-ratio:4/3; width:100%; display:grid; place-items:center; padding:24px }
    .hint{position:absolute; top:14px; left:14px; background:rgba(245,158,11,.15); color:#fde68a; border:1px dashed #f59e0b; border-radius:999px; padding:6px 12px; font-size:12px; letter-spacing:.04em}

    .content{ padding:28px 28px 24px 24px; display:flex; flex-direction:column; gap:18px }
    .title{ font-size: clamp(24px, 3.5vw, 36px); font-weight:800; letter-spacing:.01em }
    .subtitle{ color:var(--muted) }

    .price-row{ display:flex; align-items:center; gap:14px }
    .price{ font-weight:800; font-size:24px }
    .badge{ font-size:12px; padding:6px 10px; border-radius:999px; border:1px solid var(--border); color:#fef9c3; background:rgba(245,158,11,.16)}

    .qty{ display:flex; align-items:center; gap:10px }
    .qty input{ width:64px; padding:10px; border-radius:12px; background:transparent; border:1px solid var(--border); color:var(--text); text-align:center; font-size:16px }
    .note{ font-size:14px; color:var(--muted) }

    .actions{ display:flex; gap:12px; flex-wrap:wrap }
    .btn{ cursor:pointer; padding:14px 18px; border-radius:12px; border:1px solid var(--border); background:transparent; color:var(--text); font-weight:700 }
    .btn.primary{ background:linear-gradient(180deg, rgba(34,197,94,.95), rgba(16,185,129,.95)); color:#062b1b; border:none }
    .btn:disabled{ opacity:.6; cursor:not-allowed }

    .footer{ display:flex; justify-content:space-between; align-items:center; gap:12px; color:var(--muted); font-size:12px; border-top:1px solid var(--border); padding:14px 24px }

    /* Cute pig placeholder as inline SVG */
    .pig{ width:min(520px, 90%); filter: drop-shadow(0 18px 28px rgba(0,0,0,.35)); }
  </style>
</head>
<body>
  <div class="wrap">
    <article class="product" aria-label="电商商品卡片">
      <section class="media">
        <div class="hint">可替换为你自己的商品图</div>
        <div class="media-inner">
          <!-- 可爱的猪 (占位 SVG)。如果有真实图片，把下面整个 <svg> 换成 <img src="你的图片URL" alt="可爱的猪" class="pig" /> 即可 -->
          <svg class="pig" viewBox="0 0 300 260" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="可爱的猪">
            <defs>
              <radialGradient id="g1" cx="50%" cy="30%" r="70%">
                <stop offset="0%" stop-color="#ffe1ea"/>
                <stop offset="100%" stop-color="#f9a8d4"/>
              </radialGradient>
            </defs>
            <ellipse cx="150" cy="140" rx="120" ry="90" fill="url(#g1)"/>
            <circle cx="100" cy="120" r="16" fill="#111" opacity=".85"/>
            <circle cx="200" cy="120" r="16" fill="#111" opacity=".85"/>
            <ellipse cx="150" cy="160" rx="46" ry="32" fill="#fda4af" stroke="#fb7185" stroke-width="3"/>
            <circle cx="136" cy="160" r="6" fill="#6b0216"/>
            <circle cx="164" cy="160" r="6" fill="#6b0216"/>
            <path d="M40 120 C30 80, 60 60, 90 70" fill="none" stroke="#f9a8d4" stroke-width="10" stroke-linecap="round"/>
            <path d="M260 120 C270 80, 240 60, 210 70" fill="none" stroke="#f9a8d4" stroke-width="10" stroke-linecap="round"/>
            <path d="M120 190 Q150 210 180 190" fill="none" stroke="#fb7185" stroke-width="6" stroke-linecap="round"/>
            <circle cx="230" cy="185" r="14" fill="#f9a8d4"/>
          </svg>
        </div>
      </section>

      <section class="content">
        <div>
          <h1 class="title">何国顺</h1>
          <div class="subtitle">商品编号：HG-001 · 限量单版</div>
        </div>

        <div class="price-row">
          <div class="price">¥ 0.00</div>
          <span class="badge">限购 1 件</span>
        </div>

        <div class="qty">
          <label for="qty">数量：</label>
          <input id="qty" type="number" value="1" min="1" max="1" />
        </div>

        <div class="note">备注：请联系 owner：<strong>melody</strong></div>

        <div class="actions">
          <button id="buy" class="btn primary">立即下单</button>
          <button id="add" class="btn">加入购物车</button>
        </div>

        <div id="tip" class="note" role="status" aria-live="polite"></div>

        <div class="footer">
          <span>仓库：gift-page-only-owned-by-mel</span>
          <span>Hosted on Vercel</span>
        </div>
      </section>
    </article>
  </div>

  <script>
    const qty = document.getElementById('qty');
    const tip = document.getElementById('tip');
    const buy = document.getElementById('buy');
    const add = document.getElementById('add');

    function enforceLimit(){
      if(+qty.value > 1){ qty.value = 1; }
      tip.textContent = '此商品限购 1 件';
    }
    qty.addEventListener('input', enforceLimit);

    function simulate(action){
      tip.style.color = 'var(--accent)';
      tip.textContent = (action === 'buy') ? '下单请求已提交（示例页面，不会真的下单）' : '已加入购物车（示例页面）';
    }
    buy.addEventListener('click', () => simulate('buy'));
    add.addEventListener('click', () => simulate('add'));

    // 初始文案
    tip.textContent = '备注：请联系 owner：melody';
  </script>
</body>
</html>
